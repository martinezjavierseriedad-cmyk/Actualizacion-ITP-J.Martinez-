<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Desafío Académico - Javier Martínez</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --physics: #f39c12;
            --chemistry: #e74c3c;
            --biology: #2ecc71;
            --geography: #3498db;
            --history: #9b59b6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        #quiz-screen, #result-screen { display: none; }

        h1 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 10px; }
        
        .btn-start, .btn-action {
            background: #764ba2;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 20px;
        }

        .btn-start:hover { transform: scale(1.05); background: #5a3a8a; }

        .btn-option {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-option:hover { border-color: #764ba2; background: #f9f9f9; }
        .correct { background: #2ecc71 !important; color: white; border-color: #2ecc71 !important; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c !important; }

        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin: 20px 0; }
        #progress-fill { height: 100%; background: #764ba2; width: 0%; transition: width 0.3s; }
        
        .category-badge { font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 5px; color: white; }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <h1>Super Desafío Académico</h1>
    <p>Pon a prueba tus conocimientos generales.</p>
    <button class="btn-start" onclick="startQuiz()">Comenzar Reto</button>
</div>

<div class="card" id="quiz-screen">
    <div id="category-box" class="category-badge"></div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <h2 id="question-text">Pregunta</h2>
    <div id="options-container"></div>
</div>

<div class="card" id="result-screen">
    <h1>Resultados</h1>
    <p id="score-text"></p>
    <button class="btn-start" onclick="location.reload()">Reiniciar</button>
</div>

<script>
    const questions = [
        { q: "¿Cuál es el elemento químico más abundante en el universo?", a: ["Hidrógeno", "Oxígeno", "Helio", "Carbono"], correct: 0, cat: "Química" },        { q: "¿En qué año cayó el Muro de Berlín?", a: ["1987", "1989", "1991", "1985"], correct: 1, cat: "Historia" },
        { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Yangtsé", "Misisipi"], correct: 1, cat: "Geografía" },
        { q: "¿Qué planeta es conocido como el planeta rojo?", a: ["Venus", "Júpiter", "Marte", "Saturno"], correct: 2, cat: "Ciencias" },
        { q: "¿Quién escribió 'Don Quijote de la Mancha'?", a: ["Lope de Vega", "Cervantes", "Quevedo", "Góngora"], correct: 1, cat: "Literatura" },
        { q: "¿Cuál es la unidad básica de la vida?", a: ["Átomo", "Célula", "Molécula", "Tejido"], correct: 1, cat: "Biología" }
    ];

    let currentIdx = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('category-box').innerText = q.cat;
        document.getElementById('category-box').style.backgroundColor = 'var(--' + q.cat.toLowerCase() + ')';
        document.getElementById('question-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            container.appendChild(btn);
        });

        document.getElementById('progress-fill').style.width = (currentIdx / questions.length) * 100 + '%';
    }

    function checkAnswer(idx) {
        const btns = document.querySelectorAll('.btn-option');
        const correct = questions[currentIdx].correct;
        
        btns.forEach((b, i) => {
            b.disabled = true;
            if (i === correct) b.classList.add('correct');
            else if (i === idx) b.classList.add('wrong');
        });

        if (idx === correct) score++;
        
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < questions.length) showQuestion();
            else showResults();
        }, 1500);
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = Tu puntuación final es: ${score} de ${questions.length};
    }
</script>

</body>
</html>
