<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiper Super Ultra Desafío Académico - Javier Martínez</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --physics: #f39c12;
            --chemistry: #e74c3c;
            --biology: #2ecc71;
            --geography: #3498db;
            --history: #9b59b6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* Pantallas */
        #quiz-screen, #result-screen { display: none; }

        h1 { color: #2c3e50; font-size: 2rem; margin-bottom: 10px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; }

        .btn-start {
            background: #764ba2;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-start:hover { transform: scale(1.05); background: #667eea; }

        /* Categorías y Progreso */
        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #764ba2;
            width: 0%;
            transition: width 0.3s;
        }

        /* Inputs y Botones de respuesta */
        .btn-option {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-option:hover { border-color: #764ba2; background: #f9f9f9; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1.1rem;
            text-align: center;
        }

        .correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }

        #next-btn, #check-btn {
            background: #2c3e50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .credits {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #95a5a6;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1>🚀 Super Quiz</h1>
        <p class="subtitle">Pon a prueba tu mente en Ciencias e Historia</p>
        <button class="btn-start" onclick="startQuiz()">¡Empezar ahora!</button>
        <div class="credits">Elaborado por Javier Martinez 3er Año C</div>
    </div>

    <div id="quiz-screen" class="card">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="badge" class="badge">Materia</div>
        <h2 id="question-text">Pregunta aquí</h2>
        
        <div id="answer-area">
            </div>

        <button id="check-btn" onclick="handleAction()">Comprobar</button>
        <button id="next-btn" style="display:none" onclick="nextQuestion()">Siguiente →</button>
        
        <div class="credits">Javier Martinez 3er Año C</div>
    </div>

    <div id="result-screen" class="card">
        <h1>¡Terminado!</h1>
        <p id="final-score" style="font-size: 1.5rem; font-weight: bold;"></p>
        <button class="btn-start" onclick="location.reload()">Reiniciar</button>
        <div class="credits">Elaborado por Javier Martinez 3er Año C</div>
    </div>

<script>
    const questions = [
        // FÍSICA
        { type: "select", cat: "Física", color: "var(--physics)", q: "¿Cuál es la unidad de fuerza en el S.I.?", options: ["Joule", "Newton", "Watt", "Pascal"], correct: "Newton" },
        { type: "input", cat: "Física", color: "var(--physics)", q: "Escribe el símbolo químico del Oro:", correct: "Au" },
        
        // QUÍMICA
        { type: "select", cat: "Química", color: "var(--chemistry)", q: "¿Qué pH se considera neutro?", options: ["0", "1", "7", "14"], correct: "7" },
        { type: "input", cat: "Química", color: "var(--chemistry)", q: "Escribe la fórmula química del Agua:", correct: "H2O" },

        // BIOLOGÍA
        { type: "select", cat: "Biología", color: "var(--biology)", q: "¿Qué órgano bombea la sangre?", options: ["Cerebro", "Pulmón", "Corazón", "Hígado"], correct: "Corazón" },
        { type: "input", cat: "Biología", color: "var(--biology)", q: "¿Cómo se llama el pigmento verde de las plantas?", correct: "Clorofila" },

        // GEOGRAFÍA
        { type: "select", cat: "Geografía", color: "var(--geography)", q: "¿Cuál es el continente más grande?", options: ["América", "África", "Asia", "Europa"], correct: "Asia" },
        { type: "input", cat: "Geografía", color: "var(--geography)", q: "¿En qué país están las pirámides de Giza?", correct: "Egipto" },

        // HISTORIA
        { type: "select", cat: "Historia", color: "var(--history)", q: "¿En qué año se descubrió América?", options: ["1492", "1789", "1914", "1500"], correct: "1492" },
        { type: "input", cat: "Historia", color: "var(--history)", q: "¿Cómo se apellidaba el líder de la Alemania Nazi?", correct: "Hitler" }
    ];

    let currentIdx = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        const area = document.getElementById('answer-area');
        const badge = document.getElementById('badge');
        
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
        badge.innerText = q.cat;
        badge.style.background = q.color;
        
        // Actualizar barra
        document.getElementById('progress-fill').style.width = ((currentIdx) / questions.length * 100) + "%";

        area.innerHTML = '';
        if(q.type === "select") {
            q.options.forEach(opt => {
                area.innerHTML += `<button class="btn-option" onclick="selectOption(this)">${opt}</button>`;
            });
            document.getElementById('check-btn').style.display = 'none'; // Se comprueba al hacer clic en la opción
        } else {
            area.innerHTML = `<input type="text" id="user-input" placeholder="Escribe tu respuesta aquí...">`;
        }
    }

    function selectOption(btn) {
        const q = questions[currentIdx];
        if(btn.innerText === q.correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // Mostrar la correcta
            Array.from(document.getElementsByClassName('btn-option')).forEach(b => {
                if(b.innerText === q.correct) b.classList.add('correct');
            });
        }
        disableOptions();
        showNext();
    }

    function handleAction() {
        const q = questions[currentIdx];
        const input = document.getElementById('user-input');
        if(!input) return;

        const userAns = input.value.trim().toLowerCase();
        const correctAns = q.correct.toLowerCase();

        if(userAns === correctAns) {
            input.classList.add('correct');
            score++;
        } else {
            input.classList.add('wrong');
            input.value = `Error. Era: ${q.correct}`;
        }
        input.disabled = true;
        showNext();
    }

    function disableOptions() {
        Array.from(document.getElementsByClassName('btn-option')).forEach(b => b.disabled = true);
    }

    function showNext() {
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Puntaje: ${score} de ${questions.length}`;
    }
</script>
</body>
</html>
